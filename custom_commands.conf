# =========================================================================
# arch-smart-update custom commands configuration
#
# NOTE: If you are reading this in the '.default.conf' file, DO NOT edit it,
# as it will be overwritten by updates. Edit 'custom_commands.conf' instead.
# =========================================================================
#
# If this file contains uncommented lines, the script will execute them
# EXCLUSIVELY, ignoring standard utilities (eos-update, topgrade, pacman).
#
# Write commands as you would type them in a terminal (one per line).
# Commands are executed sequentially. If one fails, the process will abort.
#
# Examples:
# my_cool_script
# paru -Syu
# flatpak update -y
