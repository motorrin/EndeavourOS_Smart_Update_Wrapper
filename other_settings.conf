# =========================================================================
# General user settings for Arch Smart Update.
#
# NOTE: If you are reading this in the '.default.conf' file, DO NOT edit it,
# as it will be overwritten by updates. Edit 'other_settings.conf' instead.
# =========================================================================
#
# Set to true to always ask if you want to refresh mirrors before syncing databases.
PROMPT_MIRROR_REFRESH=false
#
# Number of Pacman DB backups to keep in /var/lib/pacman/backup/
MAX_BACKUP_COPIES=5
#
# Override the default AUR helper (e.g. "yay", "pikaur"). Leave empty to auto-detect.
AUR_HELPER_OVERRIDE=""
#
# Minimum age for ANY package (allows mirrors to fully sync). Integers only.
T_MIRROR_H=3
#
# Delay for FEATURE packages (e.g., pipewire, networkmanager). Integers only.
T_FEAT_H=6
#
# Delay for CRITICAL packages (e.g., base, mesa, xorg, wayland). Integers only.
T_CRIT_H=12
#
# Delay for Desktop Environments (e.g., Plasma, Gnome, Hyprland). Integers only.
T_DE_H=12
#
# Delay for NUCLEAR / Core system packages (e.g., linux, glibc, systemd). Integers only.
T_NUKE_H=24
#
# If true, updates identified as "Patch" (e.g., minor bugfixes or pkgrel rebuilds)
# will ignore their category timers (like 24h for NUKE) and will only
# wait for the base T_MIRROR_H timer (3h by default) to ensure mirrors are synced.
IGNORE_PATCH_TIMERS=true
#
# Enable background update checker (requires the "libnotify" package)
ENABLE_BACKGROUND_CHECK=false
#
# Interval for checking updates in the background (systemd formats supported: 30min, 1h, 2h)
CHECK_INTERVAL=30min
#
# Delay before the first check after system startup
START_DELAY=5min
#
# Allow the script to save logs to ~/.config/arch-smart-update/
GENERATE_LOGS=false
#
# Maximum number of logs to save
MAX_LOG_NUMBERS=5
