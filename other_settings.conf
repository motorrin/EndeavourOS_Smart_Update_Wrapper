# =========================================================================
# General user settings for Arch Smart Update.
#
# NOTE: If you are reading this in the '.default.conf' file, DO NOT edit it,
# as it will be overwritten by updates. Edit 'other_settings.conf' instead.
# =========================================================================
#
# Set to true to always ask if you want to refresh mirrors before syncing databases.
PROMPT_MIRROR_REFRESH=false

# Number of Pacman DB backups to keep in /var/lib/pacman/backup/
MAX_BACKUP_COPIES=5

# Override the default AUR helper (e.g. "yay", "pikaur"). Leave empty to auto-detect.
AUR_HELPER_OVERRIDE=""
